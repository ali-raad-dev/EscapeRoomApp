name: Build Windows installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install 7-Zip
        shell: pwsh
        run: |
          choco install 7zip -y

      - name: Create self-extracting 7z installer
        shell: pwsh
        run: |
          Set-Location ${{ github.workspace }}
          npm run build
          # create a 7z archive of the dist folder
          7z a -t7z EscapeRoomApp.7z .\dist\*
          # create an SFX exe from the 7z archive
          7z a -sfx EscapeRoomApp-Setup.exe EscapeRoomApp.7z

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: EscapeRoomApp-Setup.exe
