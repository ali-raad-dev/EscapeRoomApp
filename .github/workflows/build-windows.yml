name: Build Windows installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Build and package dist zip
        shell: pwsh
        run: |
          Set-Location ${{ github.workspace }}
          npm run build
          if (Test-Path .\EscapeRoomApp.zip) { Remove-Item .\EscapeRoomApp.zip }
          Compress-Archive -Path .\dist\* -DestinationPath .\EscapeRoomApp.zip -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-zip
          path: EscapeRoomApp.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: EscapeRoomApp-Setup.exe
