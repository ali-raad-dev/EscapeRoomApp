name: Build Windows installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install 7-Zip
        shell: pwsh
        run: |
          choco install 7zip -y

      - name: Diagnose 7z and environment
        shell: pwsh
        run: |
          Write-Host "PATH=$env:PATH"
          choco --version || Write-Host "choco not found"
          $seven = Get-Command 7z -ErrorAction SilentlyContinue
          if ($seven) { Write-Host "7z found: $($seven.Source)" } else { Write-Host "7z not found in PATH" }
          npm --version
          node --version

      - name: Create self-extracting 7z installer
        shell: pwsh
        run: |
          Set-Location ${{ github.workspace }}
          npm run build
          $seven = (Get-Command 7z -ErrorAction SilentlyContinue).Source
          if (-not $seven) { Write-Error "7z executable not found; aborting"; exit 1 }
          & $seven a -t7z EscapeRoomApp.7z .\dist\*
          & $seven a -sfx EscapeRoomApp-Setup.exe EscapeRoomApp.7z

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: EscapeRoomApp-Setup.exe
