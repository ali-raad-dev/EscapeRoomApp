name: Release Windows installer

on:
  push:
    tags:
      - 'v*'

jobs:
  release-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: CI diagnostics
        shell: pwsh
        run: |
          Write-Host "== CI diagnostics =="
          node -v || Write-Host "node not available"
          npm -v || Write-Host "npm not available"
          Write-Host "Environment vars (selected):"
          Write-Host "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=$env:FORCE_JAVASCRIPT_ACTIONS_TO_NODE24"
          Write-Host "ELECTRON_SKIP_BINARY_DOWNLOAD=$env:ELECTRON_SKIP_BINARY_DOWNLOAD"
          Write-Host "Listing workspace files:"
          Get-ChildItem -Force -File -Recurse -Depth 1 | Select-Object -First 50 | ForEach-Object { Write-Host $_.FullName }

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Build and package dist zip
        shell: pwsh
        run: |
          Set-Location ${{ github.workspace }}
          npm run build
          if (Test-Path .\EscapeRoomApp.zip) { Remove-Item .\EscapeRoomApp.zip }
          Compress-Archive -Path .\dist\* -DestinationPath .\EscapeRoomApp.zip -Force

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        id: upload_release_asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: EscapeRoomApp.zip
          asset_name: EscapeRoomApp.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
