name: Release Windows installer

on:
  push:
    tags:
      - 'v*'

jobs:
  release-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install 7-Zip
        shell: pwsh
        run: |
          choco install 7zip -y

      - name: Diagnose 7z and environment
        shell: pwsh
        run: |
          Write-Host "PATH=$env:PATH"
          choco --version || Write-Host "choco not found"
          $seven = Get-Command 7z -ErrorAction SilentlyContinue
          if ($seven) { Write-Host "7z found: $($seven.Source)" } else { Write-Host "7z not found in PATH" }
          npm --version
          node --version

      - name: Create self-extracting 7z installer
        shell: pwsh
        run: |
          Set-Location ${{ github.workspace }}
          npm run build
          $seven = (Get-Command 7z -ErrorAction SilentlyContinue).Source
          if (-not $seven) { Write-Error "7z executable not found; aborting"; exit 1 }
          & $seven a -t7z EscapeRoomApp.7z .\dist\*
          & $seven a -sfx EscapeRoomApp-Setup.exe EscapeRoomApp.7z

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            EscapeRoomApp-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
