name: Release Windows installer

on:
  push:
    tags:
      - 'v*'

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Create self-extracting 7z installer
        shell: pwsh
        run: |
          Set-Location ${{ github.workspace }}
          npm run build
          7z a -t7z EscapeRoomApp.7z .\dist\*
          7z a -sfx EscapeRoomApp-Setup.exe EscapeRoomApp.7z

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            EscapeRoomApp-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
