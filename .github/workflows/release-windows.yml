name: Release Windows installer

on:
  push:
    tags:
      - 'v*'

jobs:
  release-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Build and package dist zip
        shell: pwsh
        run: |
          Set-Location ${{ github.workspace }}
          npm run build
          if (Test-Path .\EscapeRoomApp.zip) { Remove-Item .\EscapeRoomApp.zip }
          Compress-Archive -Path .\dist\* -DestinationPath .\EscapeRoomApp.zip -Force

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            EscapeRoomApp.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
